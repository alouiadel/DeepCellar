<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepCellar — Chat</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/static/favicon-32.png"
    />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="dashboard">
    <header class="topbar">
      <div class="brand">
        <img class="logo-img" src="/static/favicon.svg" alt="DeepCellar logo" />
        <span>DeepCellar</span>
      </div>
      <nav class="nav">
        <a href="/app.html" class="nav-link active">Chat</a>
        <a href="/models.html" class="nav-link">Models</a>
      </nav>
      <div class="user-area">
        <span id="userInfo" class="user-info"></span>
        <button id="logoutBtn" class="btn-secondary">Log out</button>
      </div>
    </header>

    <main class="chat-layout">
      <div id="statusArea" class="status-area" role="status"></div>

      <div id="messages" class="messages" hidden></div>

      <form id="chatForm" class="composer" hidden>
        <textarea
          id="chatInput"
          rows="1"
          placeholder="Message… (Enter to send, Shift+Enter for a new line)"
          autocomplete="off"
        ></textarea>
        <div class="composer-bar">
          <div class="model-picker" id="modelPicker">
            <button
              type="button"
              class="model-picker-btn"
              id="modelPickerBtn"
              aria-haspopup="listbox"
              aria-expanded="false"
              disabled
            >
              <span id="modelPickerLabel">Loading…</span>
              <svg
                class="chevron"
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="none"
              >
                <path
                  d="M6 9l6 6 6-6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div
              class="model-picker-panel"
              id="modelPickerPanel"
              role="listbox"
              hidden
            ></div>
          </div>
          <button
            type="submit"
            class="send-btn"
            id="sendBtn"
            aria-label="Send message"
            disabled
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path
                d="M12 19V5m0 0l-6 6m6-6l6 6"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </form>
    </main>

    <script src="/static/vendor/marked.umd.js"></script>
    <script src="/static/vendor/purify.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
